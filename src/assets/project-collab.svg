<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgCollab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF1FF"/>
      <stop offset="100%" stop-color="#E3E7FF"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B5BFD"/>
      <stop offset="100%" stop-color="#2940C9"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6D5CFF"/>
      <stop offset="100%" stop-color="#4F3FE0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgCollab)"/>

  <!-- Lignes de connexion entre les avatars (réseau d'équipe) -->
  <g stroke="#B7BEF2" stroke-width="2" fill="none">
    <line x1="170" y1="150" x2="300" y2="100"/>
    <line x1="300" y1="100" x2="430" y2="150"/>
    <line x1="170" y1="150" x2="300" y2="230"/>
    <line x1="430" y1="150" x2="300" y2="230"/>
  </g>

  <!-- Avatars membres de l'équipe -->
  <g>
    <circle cx="170" cy="150" r="34" fill="#FFFFFF" stroke="#3B5BFD" stroke-width="3"/>
    <circle cx="170" cy="138" r="11" fill="#3B5BFD"/>
    <path d="M150 172 C150 156, 190 156, 190 172" fill="#3B5BFD"/>
  </g>
  <g>
    <circle cx="430" cy="150" r="34" fill="#FFFFFF" stroke="#6D5CFF" stroke-width="3"/>
    <circle cx="430" cy="138" r="11" fill="#6D5CFF"/>
    <path d="M410 172 C410 156, 450 156, 450 172" fill="#6D5CFF"/>
  </g>
  <g>
    <circle cx="300" cy="100" r="30" fill="#FFFFFF" stroke="#A78BFA" stroke-width="3"/>
    <circle cx="300" cy="90" r="9.5" fill="#A78BFA"/>
    <path d="M283 119 C283 105, 317 105, 317 119" fill="#A78BFA"/>
  </g>
  <g>
    <circle cx="300" cy="230" r="30" fill="url(#cardA)" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="300" cy="220" r="9.5" fill="#FFFFFF" opacity="0.9"/>
    <path d="M283 249 C283 235, 317 235, 317 249" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- Cartes "code" en bas, façon mockup de site -->
  <g transform="translate(110,290)">
    <rect width="160" height="78" rx="10" fill="#FFFFFF" stroke="#D7DBF5" stroke-width="2"/>
    <rect x="14" y="16" width="80" height="8" rx="4" fill="url(#cardA)"/>
    <rect x="14" y="34" width="132" height="6" rx="3" fill="#DEE1F6"/>
    <rect x="14" y="48" width="100" height="6" rx="3" fill="#DEE1F6"/>
  </g>
  <g transform="translate(330,290)">
    <rect width="160" height="78" rx="10" fill="#FFFFFF" stroke="#D7DBF5" stroke-width="2"/>
    <rect x="14" y="16" width="80" height="8" rx="4" fill="url(#cardB)"/>
    <rect x="14" y="34" width="132" height="6" rx="3" fill="#DEE1F6"/>
    <rect x="14" y="48" width="100" height="6" rx="3" fill="#DEE1F6"/>
  </g>
</svg>
