<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgTravel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF1FF"/>
      <stop offset="100%" stop-color="#E3E7FF"/>
    </linearGradient>
    <linearGradient id="planeBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B5BFD"/>
      <stop offset="100%" stop-color="#6D5CFF"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgTravel)"/>

  <!-- Trajectoire en pointillés -->
  <path d="M70 320 C 200 260, 320 260, 560 90" fill="none" stroke="#A9B2EE" stroke-width="3" stroke-dasharray="2 12" stroke-linecap="round"/>

  <!-- Points de destination -->
  <circle cx="70" cy="320" r="7" fill="#A78BFA"/>
  <circle cx="300" cy="245" r="7" fill="#6D5CFF"/>
  <circle cx="560" cy="90" r="9" fill="#3B5BFD"/>

  <!-- Punaises de carte (pin markers) -->
  <g transform="translate(290,205)">
    <path d="M10 0 C 17 0 23 6 23 13 C 23 20 13 36 10 38 C 7 36 -3 20 -3 13 C -3 6 3 0 10 0 Z" fill="#3B5BFD"/>
    <circle cx="10" cy="13" r="5" fill="#ffffff"/>
  </g>
  <g transform="translate(60,282)">
    <path d="M10 0 C 17 0 23 6 23 13 C 23 20 13 36 10 38 C 7 36 -3 20 -3 13 C -3 6 3 0 10 0 Z" fill="#A78BFA"/>
    <circle cx="10" cy="13" r="5" fill="#ffffff"/>
  </g>

  <!-- Avion en papier stylisé, en plein vol vers la destination -->
  <g transform="translate(430,130) rotate(-24)">
    <path d="M0 0 L120 24 L70 34 L60 64 L40 34 Z" fill="url(#planeBody)"/>
    <path d="M0 0 L60 34 L40 34 Z" fill="#2940C9" opacity="0.5"/>
  </g>

  <!-- Petits nuages -->
  <g fill="#FFFFFF" opacity="0.8">
    <ellipse cx="150" cy="110" rx="34" ry="16"/>
    <ellipse cx="178" cy="100" rx="24" ry="13"/>
    <ellipse cx="480" cy="300" rx="30" ry="14"/>
    <ellipse cx="505" cy="310" rx="20" ry="11"/>
  </g>
</svg>
